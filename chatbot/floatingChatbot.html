<!-- AgentX Floating AI Chatbot -->

<div id="agentx-chatbot">

    <button id="chat-toggle">
        🤖
    </button>


    <div id="chat-window">


        <div class="chat-header">

            <span>
            🚀 AgentX AI Assistant
            </span>

            <button id="close-chat">
                ×
            </button>

        </div>


        <div id="messages">

            <div class="bot-message">
                Hello! I am AgentX AI.
                Ask me anything about your startup 🚀
            </div>

        </div>


        <div class="chat-input">


            <input 
            id="chat-message"
            placeholder="Ask about your startup..."
            />


            <button id="send-chat">
                ➤
            </button>


            <button id="voice-chat">
                🎤
            </button>


        </div>


    </div>


</div>
