<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">
    <title>Login | AgentX Startup Builder</title>
    <link rel="preconnect"
        href="https://fonts.googleapis.com">
    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="workspace.css">
</head>
<body>
    <!-- Background Blur -->
    <div class="bg-glow glow1"></div>
    <div class="bg-glow glow2"></div>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">
            <div class="logo-circle"></div>
            <h2>AgentX</h2>
        </div>
        <a href="landingPage.html" class="back-home">
            ← Back Home
        </a>
    </nav>
    <!-- Login Section -->
    <section class="auth-section">
        <div class="auth-card">
            <div class="auth-header">
                <span class="badge">
                    🚀 Welcome Back
                </span>
                <h1>
                    Login to AgentX
                </h1>
                <p>
                    Continue building your startup with AI-powered agents.
                </p>
            </div>
            <form>
                <div class="input-group">
                    <label>Email Address</label>
                    <input
                        type="email"
                        placeholder="Enter your email"
                        required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input
                        type="password"
                        placeholder="Enter your password"
                        required>
                </div>
                <div class="remember-row">
                    <label class="checkbox">
                        <input type="checkbox">
                        Remember Me
                    </label>
                    <a href="#">
                        Forgot Password?
                    </a>
                </div>
                <button
                    type="submit"
                    class="btn-primary full-width"><a href="dashboard.html">
                    Login</a>
                </button>
            </form>
            <div class="divider">
                <span>OR</span>
            </div>
            <button class="google-btn">
                <img
                    src="#"
                    alt="Google">
                Continue with Google
            </button>
            <p class="signup-link">
                Don't have an account?
                <a href="signupPage.html">
                    Create Account
                </a>
            </p>
        </div>
    </section>
    <script src="script.js"></script>
    <script src="engine.js"></script>
</body>
</html>
